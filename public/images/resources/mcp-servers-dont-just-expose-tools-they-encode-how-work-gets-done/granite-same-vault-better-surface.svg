  <circle cx="1240" cy="310" r="250" fill="url(#cool)"/>

  <text x="80" y="108" fill="#EEF1EC" font-size="76" font-weight="700" font-family="Arial, Helvetica, sans-serif" letter-spacing="-3">Same vault. Better surface.</text>
