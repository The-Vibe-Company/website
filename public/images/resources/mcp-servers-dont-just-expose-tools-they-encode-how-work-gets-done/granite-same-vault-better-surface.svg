    <radialGradient id="cool" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1260 310) rotate(132) scale(300 240)">
      <stop stop-color="#63D6B4" stop-opacity="0.18"/>
