<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="1480" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111313"/>
      <stop offset="1" stop-color="#0A0B0B"/>
    </linearGradient>
    <radialGradient id="warm" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(340 320) rotate(48) scale(260 220)">
      <stop stop-color="#F56E5D" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#F56E5D" stop-opacity="0"/>
