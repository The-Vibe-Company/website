  <text x="124" y="286" fill="#F8E4E0" font-size="52" font-weight="700" font-family="Arial, Helvetica, sans-serif">CRUD surface</text>
  <text x="1044" y="286" fill="#E6F5EF" font-size="52" font-weight="700" font-family="Arial, Helvetica, sans-serif">Intention-first</text>

