<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#faf8f5"/>

  <!-- Subtle grain texture -->
  <filter id="grain">
    <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
    <feBlend in="SourceGraphic" mode="multiply"/>
  </filter>

  <!-- Background gradient -->
  <rect width="1200" height="630" fill="url(#bg)" opacity="0.6"/>
  <defs>
    <radialGradient id="bg" cx="0.15" cy="0.15">
      <stop offset="0%" stop-color="#b67b20" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#faf8f5" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Inbox icon (envelope outline) -->
  <g transform="translate(160, 180)" stroke="#2f4736" stroke-width="3" fill="none" opacity="0.15">
    <rect x="0" y="0" width="120" height="80" rx="8"/>
    <polyline points="0,0 60,45 120,0"/>
  </g>

  <!-- Arrow from inbox to agent -->
  <line x1="310" y1="220" x2="420" y2="220" stroke="#2f4736" stroke-width="2" opacity="0.2" stroke-dasharray="8 4"/>
  <polygon points="420,215 435,220 420,225" fill="#2f4736" opacity="0.2"/>

  <!-- Agent box -->
  <g transform="translate(450, 160)">
    <rect width="300" height="120" rx="16" fill="#2f4736" opacity="0.08" stroke="#2f4736" stroke-width="2" opacity="0.15"/>
    <text x="150" y="55" text-anchor="middle" font-family="Avenir Next, Helvetica Neue, sans-serif" font-size="14" fill="#2f4736" font-weight="600" letter-spacing="0.08em" text-transform="uppercase">SKILL.MD</text>
    <text x="150" y="80" text-anchor="middle" font-family="SFMono-Regular, Menlo, monospace" font-size="12" fill="#647163">/inbox-zero</text>
    <text x="150" y="100" text-anchor="middle" font-family="SFMono-Regular, Menlo, monospace" font-size="11" fill="#647163">650 lines</text>
  </g>

  <!-- Arrow from agent to outputs -->
  <line x1="780" y1="220" x2="870" y2="160" stroke="#2f4736" stroke-width="2" opacity="0.2" stroke-dasharray="8 4"/>
  <line x1="780" y1="220" x2="870" y2="220" stroke="#2f4736" stroke-width="2" opacity="0.2" stroke-dasharray="8 4"/>
  <line x1="780" y1="220" x2="870" y2="280" stroke="#2f4736" stroke-width="2" opacity="0.2" stroke-dasharray="8 4"/>

  <!-- Output labels -->
  <g font-family="Avenir Next, Helvetica Neue, sans-serif" font-size="13" fill="#647163">
    <rect x="880" y="142" width="140" height="32" rx="16" fill="#2f4736" opacity="0.06"/>
    <text x="950" y="163" text-anchor="middle" fill="#2f4736" font-weight="600">archive 90%</text>

    <rect x="880" y="205" width="140" height="32" rx="16" fill="#b67b20" opacity="0.08"/>
    <text x="950" y="226" text-anchor="middle" fill="#956216" font-weight="600">brief 10%</text>

    <rect x="880" y="268" width="140" height="32" rx="16" fill="#2d6b66" opacity="0.08"/>
    <text x="950" y="289" text-anchor="middle" fill="#2d6b66" font-weight="600">draft replies</text>
  </g>

  <!-- Scoreboard mini -->
  <g transform="translate(350, 380)">
    <rect width="500" height="80" rx="12" fill="white" opacity="0.7" stroke="#2f4736" stroke-width="1" opacity="0.1"/>
    <g font-family="Avenir Next, Helvetica Neue, sans-serif" text-anchor="middle">
      <text x="62" y="35" font-size="10" fill="#647163" letter-spacing="0.06em">TO HANDLE</text>
      <text x="62" y="62" font-size="28" fill="#1a1a1a" font-weight="700">2</text>

      <text x="187" y="35" font-size="10" fill="#647163" letter-spacing="0.06em">SIGNALS</text>
      <text x="187" y="62" font-size="28" fill="#1a1a1a" font-weight="700">3</text>

      <text x="312" y="35" font-size="10" fill="#647163" letter-spacing="0.06em">AUTO</text>
      <text x="312" y="62" font-size="28" fill="#1a1a1a" font-weight="700">14</text>

      <text x="437" y="35" font-size="10" fill="#647163" letter-spacing="0.06em">DONE</text>
      <text x="437" y="62" font-size="28" fill="#1a1a1a" font-weight="700">4</text>
    </g>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="620" width="1200" height="10" fill="#2f4736" opacity="0.06"/>
</svg>
