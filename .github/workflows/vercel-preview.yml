name: Vercel Preview

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: vercel-preview-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: 1
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check no root layout (prevents admin hydration mismatch)
        run: bash scripts/check-no-root-layout.sh

      - name: Pull Vercel preview environment
        run: bunx vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build for Vercel preview
        run: bunx vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy preview
        id: deploy
        run: |
          deployment_url=$(
            bunx vercel deploy \
              --prebuilt \
              --archive=tgz \
              --target=preview \
              --token=${{ secrets.VERCEL_TOKEN }} \
              --meta githubCommitRef=${{ github.head_ref }} \
              --meta githubCommitSha=${{ github.event.pull_request.head.sha }} \
              --meta githubPullRequestId=${{ github.event.pull_request.number }}
          )

          echo "url=${deployment_url}" >> "$GITHUB_OUTPUT"
          echo "Preview deployment: ${deployment_url}"

      - name: Upsert PR comment
        uses: actions/github-script@v7
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.url }}
        with:
          script: |
            const marker = '<!-- vercel-preview-comment -->'
            const body = [
              marker,
              `Vercel preview ready: ${process.env.DEPLOYMENT_URL}`,
              '',
              `Commit: \`${context.payload.pull_request.head.sha.slice(0, 7)}\``,
            ].join('\n')

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            })

            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            )

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
              return
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            })
